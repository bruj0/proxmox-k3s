# values/proxmox-csi-plugin.yaml — proxmox-csi-plugin chart values.
#
# Rendered via:
#   helm upgrade --install proxmox-csi-plugin \
#     oci://ghcr.io/sergelogvinov/charts/proxmox-csi-plugin \
#     --version 0.19.1 \
#     -n csi-proxmox \
#     --create-namespace \
#     -f values/proxmox-csi-plugin.yaml
#
# Reference: https://github.com/sergelogvinov/proxmox-csi-plugin
#
# Creates a StorageClass `proxmox-lvm-thin` (marked default) that
# provisions PVCs as lvm-thin volumes on `data1` with xfs filesystem.
# Verified end-to-end on 2026-07-09 against PVE 9.2.3 (BigBertha).

# 1. credentials.secretName: same Secret as the CCM chart
#    (pve-credentials in kube-system). The CSI plugin reads the
#    config.ini key and formats it for its gRPC dial.
credentials:
  secretName: "pve-credentials"
  configIniKey: "config.ini"

# 2. StorageClass definition. The chart exposes `storageClass`
#    as a first-class value; the resulting SC is named
#    `proxmox-lvm-thin` and is marked default via the annotation
#    (consumed by the verifier.csi_storageclass_default check in
#    tools/versions.lock.yaml).
storageClass:
  default: true
  reclaimPolicy: "Delete"
  allowVolumeExpansion: true
  volumeBindingMode: "WaitForFirstConsumer"
  parameters:
    # storage: which Proxmox storage pool. data1 is the lvm-thin
    # pool on BigBertha; for hosts with a different layout, override
    # in infra/clusters/<name>/main.tf::disk_storage_pool.
    storage: "data1"
    # fstype: xfs is what the chart's mkfs.xfs wrapper expects.
    # ext4 is also supported (chart's default is ext4) but xfs has
    # online resize + better large-file perf, which matters when
    # the cluster runs databases.
    fstype: "xfs"
    # ssd=true: tells xfs to skip barrier flushes. Required if the
    # underlying LV is on an SSD-backed lvm-thin (data1 on
    # BigBertha is NVMe-backed).
    ssd: "true"

# 3. controller.replicas=1: single-CP cluster, matches the CCM chart.
controller:
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# 4. node.resources: the node DaemonSet runs one pod per node. On
#    a 4-VM cluster that's 4 pods; the controller already does the
#    volume CRUD, the node plugin just does the mount/unmount.
node:
  resources:
    requests:
      cpu: "20m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# 5. logLevel=4: same convention as the CCM chart.
logLevel: 4