# values/proxmox-ccm.yaml — proxmox-cloud-controller-manager chart values.
#
# Rendered via:
#   helm upgrade --install pccm \
#     oci://ghcr.io/sergelogvinov/charts/proxmox-cloud-controller-manager \
#     --version 0.14.0 \
#     -n kube-system \
#     -f values/proxmox-ccm.yaml
#
# Reference: https://github.com/sergelogvinov/proxmox-cloud-controller-manager
#
# Why we need this chart:
#   proxmox-csi-plugin requires a providerID + topology.kubernetes.io/{region,zone}
#   on every node. On a single-node PVE (no corosync cluster) the
#   standard cloud-provider libraries can't auto-derive these; the
#   chart installs a PVE-aware controller that sets:
#     spec.providerID                  = "proxmox://<vmid>"
#     metadata.labels.topology.kubernetes.io/region = "proxmox-host"
#     metadata.labels.topology.kubernetes.io/zone   = "<pve-hostname>"
#   per node, reconciled every reconcileSeconds.

# 1. credentials.secretName: the bootstrap pre-creates a Secret named
#    `pve-credentials` in kube-system with two keys:
#      config.ini  -> [proxmox]\nurl=<pve_url>\nusername=<pve_user>\npassword=<pve_pass>\n
#      username    -> <pve_user>
#      password    -> <pve_pass>
#    The Secret is sourced from infra/tokens/output.json (proxmox-vms
#    repo) when the operator has linked the two repos via the shared
#    `~/.cache/proxmox-k3s/credentials.json` file, OR from the local
#    .env if running standalone. tools/lib/secret_loader.py normalizes
#    the two paths so this chart values file doesn't care.
credentials:
  secretName: "pve-credentials"
  # Optional: pin the username field used by the chart's CSI sidecar
  # to lookup the Secret. Defaults to `username` upstream; pinned here
  # so a future chart bump can't drift silently.
  usernameKey: "username"
  passwordKey: "password"

# 2. region + zone: pinned per PVE host. Single-node PVE doesn't
#    auto-discover a region; we set `region="proxmox-host"` and
#    `zone=<pve_hostname>` (the tools/lib/versions.py renders
#    <pve_hostname> from PVE_URL env at bootstrap time).
region: "proxmox-host"
zone: "<pve_hostname>"

# 3. reconcileSeconds=30 matches the chart default; pinned so the
#    version drift log doesn't warn on every reconcile tick.
reconcileSeconds: 30

# 4. resources: small footprint. The chart's deployment is a single
#    pod (controller only, no sidecar) — 50m CPU + 64Mi memory is
#    plenty for a single-host cluster.
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# 5. logLevel=4: standard info-level. The chart uses 0=panic .. 7=debug
#    (matches klog). Bump to 6 when debugging the providerID setter.
logLevel: 4