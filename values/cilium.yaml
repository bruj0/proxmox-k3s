# values/cilium.yaml — cilium chart values for the proxmox-k3s bootstrap.
#
# Canonical reference:
# https://docs.cilium.io/en/stable/installation/k3s/#install-cilium
#
#   cilium install --version 1.19.5 \
#     --set=ipam.operator.clusterPoolIPv4PodCIDRList="<pod_cidr>"
#
# The cilium-cli accepts the same `key.subkey` form as
# `helm -f values.yaml`. Everything cilium needs (kubeProxyReplacement,
# k8sServiceHost, mtu, cgroup.hostRoot, ...) auto-detects from the
# cluster state at install time, so this file stays minimal.
#
# The two overrides below mirror the docs' explicit `--set` and the
# proxmox-k3s repo's single-CP-cluster rule:

# 1. ipam.operator.clusterPoolIPv4PodCIDRList: required by the docs
#    to align cilium's pod IP pool with k3s's --cluster-cidr.
#    Rendered by the orchestrator from the cluster root's
#    var.pod_cidr (cicd=172.16.0.0/16, apps=172.20.0.0/16).
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList: "<pod_cidr>"

# 2. operator.replicas=1: single-CP clusters. The chart's HA default
#    of 2 leaves the second operator pod Pending forever because
#    there's no second node to schedule it on.
operator:
  replicas: 1

# 3. gatewayAPI.enabled=false: Cilium 1.19.x's gateway-api
#    controller (cilium/cilium@v1.19.5/operator/pkg/gateway-api/cell.go)
#    hard-requires `gateway.networking.k8s.io/v1alpha2/TLSRoute`,
#    which Gateway API v1.3+ removed from the standard channel.
#    Disable cilium's gateway-api reconciler entirely; envoy-gateway
#    (installed later in helm_releases) owns the Gateway API surface.
gatewayAPI:
  enabled: false