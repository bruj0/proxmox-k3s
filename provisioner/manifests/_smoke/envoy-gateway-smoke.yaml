---
apiVersion: v1
kind: Namespace
metadata:
  name: proxmox-k3s-smoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: proxmox-k3s-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:0.2.3
          args: ["-text=proxmox-k3s-smoke-envoy-gateway"]
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: proxmox-k3s-smoke
spec:
  selector:
    app: echo
  ports:
    - port: 5678
      targetPort: 5678
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: smoke-gw
  namespace: proxmox-k3s-smoke
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: smoke
  namespace: proxmox-k3s-smoke
spec:
  parentRefs:
    - name: smoke-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 5678
